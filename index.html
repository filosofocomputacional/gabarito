<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorrigePro Web</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 15px; background: #f0f2f5; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        video, img { width: 100%; border-radius: 8px; margin-top: 10px; }
        button.btn-main { background: #007bff; color: white; border: none; padding: 14px 20px; font-size: 18px; border-radius: 6px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: bold; }
        button.btn-main:hover { background: #0056b3; }
        
        /* Painel de Calibração Retrátil */
        details { margin-top: 15px; text-align: left; background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        summary { font-weight: bold; cursor: pointer; padding: 5px; color: #333; }
        .slider-group { margin: 12px 0; }
        .slider-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 3px; }
        .slider-group input { width: 100%; }
        
        .grid-gabarito { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .grid-gabarito select { padding: 5px; border-radius: 4px; }
        
        .status-salvo { font-size: 12px; color: #28a745; font-weight: bold; float: right; }
        .card-resultado { margin-top: 20px; padding: 15px; border-radius: 8px; background: #eef9ff; border: 1px solid #b6e0fe; text-align: left; }
        .nota { font-size: 22px; font-weight: bold; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎓 CorrigePro Web</h2>
    
    <!-- Painel de Calibração e WebStorage -->
    <details>
        <summary>⚙️ Ajustar Calibração e Gabarito <span id="saveStatus" class="status-salvo"></span></summary>
        
        <h4>📝 Gabarito Oficial</h4>
        <div class="grid-gabarito" id="containerGabarito">
            <!-- Gerado via JavaScript -->
        </div>

        <h4 style="margin-top:20px;">🎛️ Calibração de Pontos (X, Y)</h4>
        
        <div class="slider-group">
            <label>Q01-05 Horiz (X1): <span id="val_x1">100</span></label>
            <input type="range" id="input_x1" min="0" max="400" value="100">
        </div>
        <div class="slider-group">
            <label>Q01-05 Vert (Y1): <span id="val_y1">104</span></label>
            <input type="range" id="input_y1" min="0" max="400" value="104">
        </div>
        <div class="slider-group">
            <label>Q06-10 Horiz (X2): <span id="val_x2">356</span></label>
            <input type="range" id="input_x2" min="0" max="800" value="356">
        </div>
        <div class="slider-group">
            <label>Q06-10 Vert (Y2): <span id="val_y2">105</span></label>
            <input type="range" id="input_y2" min="0" max="400" value="105">
        </div>
        <div class="slider-group">
            <label>Largura Letras (spX): <span id="val_spX">33</span></label>
            <input type="range" id="input_spX" min="0" max="150" value="33">
        </div>
        <div class="slider-group">
            <label>Altura Linhas (spY): <span id="val_spY">51</span></label>
            <input type="range" id="input_spY" min="0" max="250" value="51">
        </div>
    </details>

    <video id="webcam" autoplay playsinline></video>
    <button class="btn-main" id="btnCapturar">📸 CAPTURAR E CORRIGIR</button>

    <canvas id="canvas" style="display:none;"></canvas>

    <div id="painelResultado" style="display:none;" class="card-resultado">
        <div class="nota" id="textNota"></div>
        <p><strong>Gabarito Oficial:</strong> <span id="textGabaritoOficial"></span></p>
        <p><strong>Respostas Lidas:</strong> <span id="textRespostas"></span></p>
        <h4>🔍 Ponto de Leitura (Warped)</h4>
        <img id="imgWarped" src="" alt="Resultado Leitura">
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const btnCapturar = document.getElementById('btnCapturar');
    const painelResultado = document.getElementById('painelResultado');
    const CONFIG_KEY = 'corrigePro_config_v1';

    const defaultGabarito = ['B','D','C','B','C','D','C','B','A','B'];
    const LETRAS = ["A", "B", "C", "D", "E"];

    // 1. Gera os selectboxes do Gabarito na tela
    const containerGab = document.getElementById('containerGabarito');
    for (let i = 0; i < 10; i++) {
        const div = document.createElement('div');
        div.innerHTML = `<label>Q${(i+1).toString().padStart(2, '0')}: </label>
            <select id="q_${i}">
                ${LETRAS.map((l, idx) => `<option value="${l}" ${l === defaultGabarito[i] ? 'selected' : ''}>${l}</option>`).join('')}
            </select>`;
        containerGab.appendChild(div);
    }

    const sliders = ['x1', 'y1', 'x2', 'y2', 'spX', 'spY'];

    // 2. Função para Carregar do WebStorage (localStorage)
    function carregarConfiguracoes() {
        const saved = localStorage.getItem(CONFIG_KEY);
        if (saved) {
            try {
                const config = JSON.parse(saved);
                
                // Restaura Sliders
                sliders.forEach(s => {
                    if (config[s] !== undefined) {
                        document.getElementById(`input_${s}`).value = config[s];
                        document.getElementById(`val_${s}`).innerText = config[s];
                    }
                });

                // Restaura Gabarito
                if (config.gabarito && config.gabarito.length === 10) {
                    config.gabarito.forEach((val, i) => {
                        const el = document.getElementById(`q_${i}`);
                        if (el) el.value = val;
                    });
                }
            } catch (e) {
                console.error("Erro ao carregar do WebStorage", e);
            }
        }
    }

    // 3. Função para Salvar no WebStorage (localStorage)
    function salvarConfiguracoes() {
        const config = {
            gabarito: []
        };

        sliders.forEach(s => {
            const val = parseInt(document.getElementById(`input_${s}`).value);
            config[s] = val;
            document.getElementById(`val_${s}`).innerText = val;
        });

        for (let i = 0; i < 10; i++) {
            config.gabarito.push(document.getElementById(`q_${i}`).value);
        }

        localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
        
        const status = document.getElementById('saveStatus');
        status.innerText = "💾 Salvo!";
        setTimeout(() => { status.innerText = ""; }, 1500);
    }

    // Ouve alterações nos sliders e selectboxes para salvar instantaneamente
    sliders.forEach(s => {
        document.getElementById(`input_${s}`).addEventListener('input', salvarConfiguracoes);
    });
    for (let i = 0; i < 10; i++) {
        document.getElementById(`q_${i}`).addEventListener('change', salvarConfiguracoes);
    }

    // Carrega do WebStorage assim que a página abre
    carregarConfiguracoes();

    // 4. Liga a Câmera Nativa Fluida (60 FPS)
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Erro ao acessar a câmera: " + err));

    // 5. Envia Foto + Calibração Salva para o Python
    btnCapturar.addEventListener('click', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('file', blob, 'gabarito.jpg');
            
            // Monta a string do gabarito oficial (ex: "BDCBCDCBAB")
            let stringGabarito = "";
            for (let i = 0; i < 10; i++) {
                stringGabarito += document.getElementById(`q_${i}`).value;
            }
            formData.append('gabarito', stringGabarito);

            // Adiciona todas as coordenadas salvas dos sliders
            sliders.forEach(s => {
                formData.append(s, document.getElementById(`input_${s}`).value);
            });

            btnCapturar.innerText = "⏳ Processando...";

            fetch('/corrigir', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                btnCapturar.innerText = "📸 CAPTURAR E CORRIGIR";
                if(data.sucesso) {
                    painelResultado.style.display = 'block';
                    document.getElementById('textNota').innerText = `NOTA: ${data.nota.toFixed(1)} / 10.0 (${data.acertos} acertos)`;
                    document.getElementById('textGabaritoOficial').innerText = stringGabarito;
                    document.getElementById('textRespostas').innerText = data.respostas;
                    document.getElementById('imgWarped').src = data.imagem_warped;
                } else {
                    alert(data.mensagem);
                }
            })
            .catch(err => {
                btnCapturar.innerText = "📸 CAPTURAR E CORRIGIR";
                alert("Erro ao se conectar com o servidor Python!");
            });
        }, 'image/jpeg');
    });
</script>

</body>
</html>
